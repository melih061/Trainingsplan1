<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#050505"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DBA97A"/>
      <stop offset="50%" stop-color="#C4956A"/>
      <stop offset="100%" stop-color="#A67B4A"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Decorative top line -->
  <rect x="80" y="70" width="352" height="4" rx="2" fill="url(#bronzeGrad)"/>

  <!-- M Letter -->
  <text x="256" y="340"
        font-family="Arial Black, Impact, sans-serif"
        font-size="280"
        font-weight="900"
        fill="url(#bronzeGrad)"
        text-anchor="middle"
        letter-spacing="-10">M</text>

  <!-- Bottom accent line -->
  <rect x="120" y="400" width="272" height="3" rx="1.5" fill="#C4956A" opacity="0.5"/>

  <!-- Small diamond accent -->
  <polygon points="256,430 268,445 256,460 244,445" fill="#C4956A" opacity="0.7"/>
</svg>
